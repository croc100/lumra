name: Release

# Manual-only: releases are cut locally with `goreleaser release --clean` to avoid
# spending Actions minutes on this repo. This workflow stays as a fallback you can
# trigger by hand from the Actions tab if a local release isn't possible.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full tag history for changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
